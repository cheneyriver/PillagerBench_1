defaults:
  - _self_
  - agents:
    - tacticrafter

mc_port: 49172
server_port: 3000
env_wait_ticks: 80

scenarios:
  # 单条任务试跑 API 消耗：1 scenario × 1 episode。恢复完整实验时：注释掉下面 4 行，
  # 取消下方「完整基准」整段的每行 # 前缀即可。
  - name: Mushroom War
    agent: tacticrafter
    opponents: [do_nothing]
    num_episodes: 1
    kwargs:
      episode_timeout: 120

